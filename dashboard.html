<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Complete 🎉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: translateY(50px);
            opacity: 0;
            position: relative;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-icon {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        h1 {
            color: #047857;
            font-size: 32px;
            margin: 0 0 15px 0;
            font-weight: 800;
        }

        p {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
            margin: 10px 0;
        }

        .inbox-alert {
            display: inline-block;
            background-color: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
            color: #92400e;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Basic CSS Confetti generation -->
    <div id="confetti-container"></div>

    <div class="container">
        <div class="success-icon">🥳</div>
        <h1>Awesome! You're In! ✨</h1>
        <p>Your registration was completely successful, and your details have been saved to our database securely. 🔒
        </p>

        <div class="inbox-alert">
            📬 <strong>Next Step:</strong> Please check your Gmail inbox. We just sent you a verification email!
        </div>
    </div>

    <script>
        // Create random confetti pieces
        const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];
        const container = document.getElementById('confetti-container');

        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');

            // Randomize styles
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = Math.random() * 3 + 2 + 's'; // 2-5s
            confetti.style.animationDelay = Math.random() * 5 + 's';

            // Random shapes (circular or square)
            if (Math.random() > 0.5) confetti.style.borderRadius = '50%';

            container.appendChild(confetti);
        }
    </script>

</body>

</html>
