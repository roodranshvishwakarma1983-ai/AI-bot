<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration 🚀</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* for floating emojis */
            position: relative;
        }

        /* Floating background emojis */
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.6;
            z-index: 0;
        }

        .emoji-1 {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            font-size: 3rem;
        }

        .emoji-2 {
            top: 70%;
            left: 15%;
            animation-delay: 1s;
            font-size: 2.5rem;
        }

        .emoji-3 {
            top: 20%;
            right: 15%;
            animation-delay: 2s;
            font-size: 2rem;
        }

        .emoji-4 {
            top: 80%;
            right: 10%;
            animation-delay: 0.5s;
            font-size: 3.5rem;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        /* Form Container - Glassmorphism */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            z-index: 10;
            position: relative;
            transform: scale(0.9);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to {
                transform: scale(1);
            }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            font-size: 28px;
            margin-bottom: 25px;
        }

        h2 span {
            font-size: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ee;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #f8f9fa;
        }

        input:focus {
            border-color: #667eea;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Button loading animation */
        @keyframes pulseBtn {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(0.98);
                opacity: 0.9;
            }

            100% {
                transform: scale(1);
            }
        }

        .loading {
            animation: pulseBtn 1s infinite;
            background: #adb5bd !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            padding: 10px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: none;
        }

        .error {
            display: block !important;
            opacity: 1 !important;
            background-color: #fee2e2;
            color: #ef4444;
            border: 1px solid #fca5a5;
            animation: shake 0.5s ease-in-out;
        }

        .success {
            display: block !important;
            opacity: 1 !important;
            background-color: #d1fae5;
            color: #10b981;
            border: 1px solid #6ee7b7;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }
    </style>
</head>

<body>

    <!-- Floating Background Emojis -->
    <div class="floating-emoji emoji-1">✨</div>
    <div class="floating-emoji emoji-2">🚀</div>
    <div class="floating-emoji emoji-3">💻</div>
    <div class="floating-emoji emoji-4">🌟</div>

    <div class="container">
        <h2><span>👋</span> Sign Up</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label for="name">Full Name 🧑‍🦱</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address ✉️</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="enrollment">Enrollment Number 🆔</label>
                <input type="text" id="enrollment" name="enrollment" placeholder="12345678" required>
            </div>
            <div class="form-group">
                <label for="password">Password 🔒</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn">Register Now 🎯</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function (event) {
            event.preventDefault();

            // Update button state visually
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = "Processing... ⏳";

            // Reset message box
            messageDiv.className = "";

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                enrollment: document.getElementById('enrollment').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    // Show success emoji and message
                    messageDiv.innerText = result.message;
                    messageDiv.className = "success";
                    submitBtn.innerHTML = "Success! ✅";
                    submitBtn.classList.remove('loading');

                    // Add a small celebration pop animation
                    messageDiv.style.transform = "scale(1.05)";
                    setTimeout(() => messageDiv.style.transform = "scale(1)", 200);

                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    // Show error message
                    messageDiv.innerText = result.message;
                    messageDiv.className = "error";

                    // Reset button
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.innerHTML = "Register Now 🎯";
                }
            } catch (error) {
                console.error("Error during registration:", error);
                messageDiv.innerText = "Connection error. Make sure your server is running! 🔌";
                messageDiv.className = "error";
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = "Register Now 🎯";
            }
        });
    </script>

</body>

</html>
